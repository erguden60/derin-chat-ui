<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derin Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* --- THEME 1: ORİJİNAL RENK PALETİ --- */
            --bg: #f7f8fa;
            --fg: #111111;
            --gray-subtle: #e3e7f7;
            --gray-border: #bfc8e6;
            --gray-text: #333333;
            --accent: #000080;
            /* Orijinal Lacivert */

            /* Code Window Colors (Orijinal Tema Uyumu) */
            --code-bg: #f7f8fa;
            --code-header: #eef1f8;

            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- ORİJİNAL GRID BACKGROUND --- */
        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(to right, #283593 1px, transparent 1px),
                linear-gradient(to bottom, #283593 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
            opacity: 0.8;
            /* İlk tasarımdaki belirginlik */
        }

        /* Header */
        header {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--gray-text);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--fg);
        }

        /* --- LAYOUT YAPISI: SPLIT SCREEN --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
            flex: 1;
            display: flex;
            align-items: center;
            /* Dikeyde ortala */
            width: 100%;
        }

        .hero-section {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            /* Sol taraf biraz daha geniş */
            gap: 60px;
            align-items: center;
            width: 100%;
            padding: 60px 0;
        }

        /* Sol Taraf: Metinler */
        .hero-text {
            text-align: left;
            /* Sola yaslı */
        }

        h1 {
            font-size: 80px;
            /* İlk tasarımın büyüklüğünü koruduk */
            line-height: 1;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 32px;
            color: var(--fg);
            text-shadow: 0 2px 8px #00000011;
        }

        .subtitle {
            font-size: 20px;
            color: var(--gray-text);
            margin-bottom: 48px;
            font-weight: 500;
            line-height: 1.6;
            max-width: 90%;
        }

        .cta-group {
            display: flex;
            gap: 16px;
            justify-content: flex-start;
            /* Butonlar sola yaslı */
        }

        /* Butonlar (İlk Tasarım Stili) */
        .btn {
            height: 48px;
            padding: 0 32px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 0, 128, 0.2);
        }

        .btn-primary:hover {
            background: #1a237e;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #fff;
            color: var(--gray-text);
            border: 2px solid var(--gray-border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: #f3f6ff;
        }

        /* Sağ Taraf: Code Window */
        .hero-code {
            position: relative;
            perspective: 1000px;
        }

        .code-window {
            background: var(--code-bg);
            border-radius: 12px;
            border: 1.5px solid var(--gray-border);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: transform 0.3s ease;
            position: relative;
        }

        .code-window:hover {
            transform: translateY(-5px) rotateX(2deg);
        }

        /* Code Window Header (UI İyileştirmesi) */
        .window-header {
            background: var(--code-header);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--gray-border);
        }

        .window-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-red {
            background: #ff5f56;
            border: 1px solid #e0443e;
        }

        .dot-yellow {
            background: #ffbd2e;
            border: 1px solid #dea123;
        }

        .dot-green {
            background: #27c93f;
            border: 1px solid #1aab29;
        }

        .window-title {
            margin-left: 12px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: #666;
            opacity: 0.8;
        }

        .code-content {
            padding: 24px;
            text-align: left;
            font-family: var(--font-mono);
            font-size: 13px;
            color: #222;
            overflow-x: auto;
            white-space: pre;
            /* Formatı korur */
        }

        /* Syntax Highlighting (İlk Tasarım Renkleri) */
        .token.key {
            color: #d73a49;
        }

        .token.string {
            color: #032f62;
        }

        .token.bool {
            color: #005cc5;
        }

        .token.func {
            color: #6f42c1;
        }

        .token.comment {
            color: #6a737d;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .hero-section {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 40px;
                padding: 40px 0;
            }

            .hero-text {
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            h1 {
                font-size: 56px;
            }

            .cta-group {
                justify-content: center;
            }

            .code-window {
                margin: 0 auto;
                max-width: 100%;
            }

            .subtitle {
                max-width: 100%;
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>

    <header>
        <div class="logo">
            <img src="/logo.jpg" alt="Derin Chat Logo" style="height: 48px; width: auto; border-radius: 50%;">
            Derin Chat
        </div>
        <a href="https://github.com/erguden60/derin-chat-ui" class="nav-link" target="_blank">GitHub</a>
    </header>

    <div class="container">
        <div class="hero-section">

            <div class="hero-text">
                <h1>Simple.<br>Fast.<br>Reliable.</h1>
                <p class="subtitle">
                    The modern chat widget for your website. <br>
                    Copy, paste, and start chatting.
                </p>

                <div class="cta-group">
                    <button class="btn btn-secondary" onclick="openChat()">Try Demo</button>
                    <button class="btn btn-secondary" onclick="clearSession()">Reset</button>
                </div>
            </div>

            <div class="hero-code">
                <div class="code-window">
                    <!-- Mount Point for Interactive Controls -->
                    <div id="demo-controls-root"></div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { render, h } from 'preact';
        import { DemoControls } from '/src/demo/DemoControls.tsx';

        // Mount the interactive controls
        const root = document.getElementById('demo-controls-root');
        if (root) {
            render(h(DemoControls, {}), root);
        }

        window.openChat = () => {
            const host = document.getElementById('derin-chat-host');
            if (host && host.shadowRoot) {
                const launcher = host.shadowRoot.querySelector('.chat-launcher');
                if (launcher) launcher.click();
            }
        };

        window.clearSession = () => {
            localStorage.removeItem('derin-chat-messages');
            localStorage.removeItem('derin-chat-session-id');
            localStorage.removeItem('derin-chat-is-open');
            localStorage.removeItem('derin-chat-unread-count');
            location.reload();
        };
    </script>
</body>

</html>
